spring.application.name=global_meals_gradle
#強制 Spring 印出所有 Web 相關的錯誤
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

#修改 server 啟動的 port，預設是 8080
#server.port=8083
#設定資料庫連接
# 3306是連接 mysql 的 port；global_meals 是要連接的資料庫名稱
# rewriteBatchedStatements=true: 可以批次新增
#
# ╔══════════════════════════════════════════════════════════╗
# ║  【Bug 修正 1】useSSL=false&allowPublicKeyRetrieval=true  ║
# ╚══════════════════════════════════════════════════════════╝
# ❌ 原本錯誤寫法：
#    spring.datasource.url=jdbc:mysql://localhost:3306/global_meals
#
# 🔴 錯誤訊息：Public Key Retrieval is not allowed
#
# 📖 為什麼會出錯？
#    MySQL 8.0 開始預設使用一種叫做「caching_sha2_password」的加密方式來驗證密碼。
#    第一次連線時，MySQL 伺服器需要把「公鑰」傳給 Java 程式，讓 Java 把密碼加密後傳回去。
#    但 JDBC 預設基於安全考量，禁止這個「取得公鑰」的行為，所以直接拒絕連線。
#
# ✅ 解決方式：在 URL 後面加上兩個參數
#    allowPublicKeyRetrieval=true  → 允許 Java 向 MySQL 取得公鑰
#    useSSL=false                  → 關閉 SSL（本機開發用不到，開啟反而會出錯）
#    serverTimezone=Asia/Taipei    → 指定時區，避免時間存入 DB 時差 8 小時
spring.datasource.url=jdbc:mysql://localhost:3306/global_meals?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
spring.datasource.username=root
#
# ╔═══════════════════════════════════════════╗
# ║  【Bug 修正 2】資料庫密碼填錯              ║
# ╚═══════════════════════════════════════════╝
# ❌ 原本錯誤寫法：
#    spring.datasource.password=root
#
# 🔴 錯誤訊息：Access denied for user 'root'@'localhost'
#
# 📖 為什麼會出錯？
#    這個設定是告訴程式「連 MySQL 要用什麼密碼」。
#    如果你安裝 MySQL 時設定的 root 密碼不是 "root"，這裡就得改成你實際設定的密碼。
#    「Access denied」就是資料庫在說「密碼錯了，不讓你進來」。
#
# ✅ 解決方式：填入你安裝 MySQL 時設定的實際密碼
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
##session
#server.servlet.session.cookie.same-site=none;
#server.servlet.session.cookie.secure=true;

#sql schema 檔案來源: 創建表和欄位的語法，包含欄位名稱、資料型態、限制、預設值等
#classpath 是指 路徑src/main/resources
#spring.sql.init.schema-locations=classpath:schema-mysql.sql
#[always][embedded][never]
spring.sql.init.mode=always
#sql 測試資料來源: 新增測試資料的語法
#spring.sql.init.data-locations=classpath:data-mysql.sql
#會自動產生 table，但 schema 和 entity 要先建立
#spring.jpa.generate-ddl=false

#Spring Boot 允許的上傳大小，否則超過 1MB 的圖片會被攔截
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

#用於 Rate 設定檔
spring.profiles.include=secrets
#
# ╔════════════════════════════════════════════════════════════╗
# ║  【Bug 修正 3】rate.api.key 設定缺失導致 Spring 啟動失敗   ║
# ╚════════════════════════════════════════════════════════════╝
# ❌ 原本錯誤：這整行不存在
#
# 🔴 錯誤訊息：Could not resolve placeholder 'rate.api.key' in value "${rate.api.key}"
#
# 📖 為什麼會出錯？
#    在 ExchangeRatesService.java 裡，有一行類似這樣的程式碼：
#       @Value("${rate.api.key}")
#       private String apiKey;
#    @Value 的意思是「從 application.properties 讀取 rate.api.key 這個設定值，塞進 apiKey 變數」。
#    Spring Boot 啟動時會掃描所有 @Value，如果 application.properties 裡找不到對應的 key，
#    就直接拋出錯誤並且「拒絕啟動整個應用程式」，不是執行到那行才錯，是一開始就炸。
#
# ✅ 解決方式：補上這個設定，Demo 期間先填 "demo" 當 placeholder
#    正式串接匯率 API 後，再換成真實的 API Key
rate.api.key=demo